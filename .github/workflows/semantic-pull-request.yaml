name: '🛠️ Semantic Pull Request'

# yamllint disable-line rule:truthy
on:
  # Not supported when workflow contains: amannn/action-semantic-pull-request
  # workflow_dispatch:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semantic-pull-request:
    name: 'Semantic Pull Request'
    permissions:
      contents: read
      pull-requests: read
    # TEST-ONLY: points at the gate simulation branch (author identity
    # bypassed) to exercise truncation/prefix detection from a human PR.
    # yamllint disable-line rule:line-length
    uses: modeseven-lfit/releng-reusable-workflows/.github/workflows/reuse-semantic-pull-request.yaml@64cc6bd7e008d8385cac02b9c7d1af1c39e6f60d  # test/gate-sim
